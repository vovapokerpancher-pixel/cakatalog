<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAKATALOG — Топ онлайн-казино 2026</title>
    <meta name="description" content="25 лучших онлайн казино с бонусами до 1 000 000₽. Проверенные бренды, честные отзывы, быстрые выплаты." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="preload" href="/cakatalog-logo.png" as="image" />
    <link rel="preload" href="/logo.webp" as="image" type="image/webp" />
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var checkTelegram = setInterval(function() {
          if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            clearInterval(checkTelegram);
          }
        }, 5);
        setTimeout(function() { clearInterval(checkTelegram); }, 10000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
